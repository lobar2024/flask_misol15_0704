<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Vaqt salomlashish</h2>

    {% if 6 <= hour < 12 %}
        <h1>Xayrli tong, {{ name }}!</h1>

    {% elif 12 <= hour < 18 %}
        <h1>Xayrli kun, {{ name }}!</h1>

    {% elif 18 <= hour < 22 %}
        <h1>Xayrli kech, {{ name }}!</h1>

    {% else %}
        <h1>Yaxshi tunlar, {{ name }}!</h1>

    {% endif %}
</body>
</html>
